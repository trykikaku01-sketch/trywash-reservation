<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRY WASH 横須賀店 | 予約状況カレンダー</title>
    <link rel="stylesheet" href="styles.css?v=20260620-simple-white" />
  </head>
  <body class="board-page">
    <header class="site-header">
      <a class="brand" href="admin.html" aria-label="TRY WASH 横須賀店 予約管理">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M5.1 13.5 6.7 8c.3-1 1.2-1.7 2.2-1.7h6.2c1 0 1.9.7 2.2 1.7l1.6 5.5" />
            <path d="M4 14.8h16v3.5a1.4 1.4 0 0 1-1.4 1.4h-.8a1.4 1.4 0 0 1-1.4-1.4v-.2H7.6v.2a1.4 1.4 0 0 1-1.4 1.4h-.8A1.4 1.4 0 0 1 4 18.3v-3.5Z" />
            <path d="M7.3 14.8h.1M16.6 14.8h.1M8 10.2h8" />
          </svg>
        </span>
        <span>
          <strong>TRY WASH 横須賀店</strong>
          <small>予約状況カレンダー</small>
        </span>
      </a>
      <nav class="header-actions" aria-label="移動">
        <a href="admin.html" class="phone-link">管理画面</a>
        <a href="index.html" class="phone-link">予約サイト</a>
      </nav>
    </header>

    <main class="board-main">
      <section class="board-toolbar">
        <div>
          <p class="eyebrow">Reservation Board</p>
          <h1>予約状況カレンダー</h1>
          <p id="boardUpdatedAt">予約状況を読み込み中です。</p>
        </div>
        <div class="board-actions">
          <button class="icon-button" id="boardPrevMonth" type="button" aria-label="前の月" title="前の月">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
          </button>
          <button class="text-button" id="boardThisMonth" type="button">今月</button>
          <button class="icon-button" id="boardNextMonth" type="button" aria-label="次の月" title="次の月">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
          </button>
          <button class="primary-button board-save-button" id="boardSaveImage" type="button">画像保存</button>
        </div>
      </section>

      <section class="board-canvas-panel" aria-label="予約状況画像">
        <canvas id="reservationBoardCanvas" width="1400" height="1000"></canvas>
      </section>
    </main>

    <script src="runtime-config.js?v=20260620-simple-white"></script>
    <script src="shared-api.js?v=20260620-simple-white"></script>
    <script src="reservation-board.js?v=20260620-simple-white"></script>
  </body>
</html>
