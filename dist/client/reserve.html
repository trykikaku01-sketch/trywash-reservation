<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRY WASH | 予約店舗選択</title>
    <link rel="stylesheet" href="styles.css?v=20260620-simple-white" />
  </head>
  <body class="store-select-page">
    <header class="site-header">
      <a class="brand" href="reserve.html" aria-label="TRY WASH 店舗選択">
        <img class="brand-logo" src="assets/trywash-logo-white.jpg" alt="TRYWASH" />
        <span>
          <strong>予約店舗を選択</strong>
          <small>洗車・コーティング予約</small>
        </span>
      </a>
      <nav class="header-actions" aria-label="管理導線">
        <a href="admin.html" class="phone-link">予約管理</a>
      </nav>
    </header>

    <main class="store-select-main">
      <section class="store-select-hero" aria-labelledby="store-select-title">
        <img class="hero-logo" src="assets/trywash-logo-white.jpg" alt="TRYWASH" />
        <p class="eyebrow">Reservation</p>
        <h1 id="store-select-title">ご予約店舗をお選びください</h1>
      </section>

      <section class="store-card-grid" aria-label="店舗選択">
        <a class="store-card store-card-main" href="yokosuka.html">
          <span class="store-card-copy">
            <span>TRY WASH 横須賀店</span>
            <strong>横須賀店で予約する</strong>
            <b>メイン店舗・全メニュー対応</b>
            <small>コーティング、研磨、車内清掃、各種セットメニューなど、全メニューに対応しています。しっかり施工をご希望の方はこちらをお選びください。</small>
          </span>
          <iframe class="store-map" title="TRY WASH 横須賀店 Googleマップ" src="https://www.google.com/maps?q=TRY%20WASH%20%E6%A8%AA%E9%A0%88%E8%B3%80%E5%BA%97&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </a>
        <a class="store-card" href="yokohama.html">
          <span class="store-card-copy">
            <span>TRY WASH 横浜店</span>
            <strong>横浜店の限定受付日を確認する</strong>
            <b>限定日程・限定メニュー受付</b>
            <small>既存のお客様や横浜方面のお客様向けに、限定日程・限定メニューで受付しております。内容によっては横須賀店をご案内する場合があります。</small>
          </span>
          <iframe class="store-map" title="TRY WASH 横浜店 Googleマップ" src="https://www.google.com/maps?q=TRY%20WASH%20%E6%A8%AA%E6%B5%9C%E5%BA%97&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </a>
      </section>
    </main>
  </body>
</html>
