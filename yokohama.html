<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRY WASH 横浜店 | 洗車コーティング予約</title>
    <link rel="stylesheet" href="styles.css?v=20260620-simple-white" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="TRY WASH 横浜店 ホーム">
        <img class="brand-logo" src="assets/trywash-logo-white.jpg" alt="TRYWASH" />
        <span>
          <strong>横浜店 予約サイト</strong>
          <small>洗車・コーティング予約</small>
        </span>
      </a>
      <nav class="header-actions" aria-label="予約導線">
        <a href="reserve.html" class="phone-link">店舗を選ぶ</a>
        <a href="https://lin.ee/sGSGxIY" class="phone-link line-reservation-link">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.7 8.7 0 0 1-3.8-.9L3 21l1.8-5a8.5 8.5 0 1 1 16.2-4.5Z" />
          </svg>
          LINE予約
        </a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <img class="hero-logo" src="assets/trywash-logo-white.jpg" alt="TRYWASH" />
          <h1 id="page-title">横浜店 予約サイト</h1>
        </div>
      </section>

      <section class="booking-shell" aria-label="予約">
        <aside class="menu-rail" id="menuStep" aria-label="予約条件">
          <div class="store-reservation-note" id="storeReservationNote"></div>
          <div class="vehicle-block" id="vehicleStep">
            <div class="section-head">
              <p class="eyebrow">Vehicle</p>
              <h2>車両サイズ・車種</h2>
            </div>
            <div class="vehicle-guide-wrap" id="vehicleGuide"></div>
            <div id="vehicleSizes" aria-label="車両サイズ選択"></div>
          </div>

          <div class="section-head menu-section-head">
            <p class="eyebrow">Menu</p>
            <h2>メニュー</h2>
          </div>
          <div class="menu-list" id="menuList"></div>
          <div class="menu-options" id="menuOptions"></div>
          <div class="loaner-options" id="loanerOptions"></div>
        </aside>

        <section class="calendar-pane" id="calendarStep" aria-label="日時選択">
          <div class="calendar-top">
            <div>
              <p class="eyebrow">Calendar</p>
              <h2 id="weekTitle">本日から1ヶ月の予約カレンダー</h2>
            </div>
            <div class="week-controls">
              <button class="icon-button" id="prevWeek" type="button" aria-label="前の週" title="前の週">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m15 18-6-6 6-6" />
                </svg>
              </button>
              <button class="text-button" id="todayButton" type="button">今日へ移動</button>
              <button class="text-button" id="currentWeekButton" type="button">今週表示</button>
              <button class="text-button" id="monthViewButton" type="button">1ヶ月表示</button>
              <button class="icon-button" id="nextWeek" type="button" aria-label="次の週" title="次の週">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m9 18 6-6-6-6" />
                </svg>
              </button>
            </div>
          </div>

          <div class="week-grid" id="weekGrid" role="list"></div>
          <div class="availability-overview" id="availabilityOverview" aria-live="polite"></div>

          <div class="slots-head">
            <div>
              <p class="eyebrow">Time</p>
              <h3 id="selectedDateTitle">日時</h3>
            </div>
            <span class="hours-pill" id="hoursPill">-</span>
          </div>
          <div class="slot-grid" id="slotGrid"></div>
        </section>

        <aside class="summary-rail" aria-label="予約内容">
          <div class="section-head">
            <h2>予約内容</h2>
          </div>

          <div class="summary-box" id="summaryBox"></div>

          <form id="bookingForm" class="booking-form">
            <label>
              お名前
              <input id="customerName" name="customerName" autocomplete="name" required placeholder="山田 太郎" />
            </label>
            <label>
              電話番号
              <input id="customerPhone" name="customerPhone" autocomplete="tel" required placeholder="090-0000-0000" />
            </label>
            <label>
              車種名
              <input id="carModel" name="carModel" autocomplete="off" placeholder="例：アルファード" />
            </label>
            <label>
              ご来店のきっかけ
              <select id="visitReason" name="visitReason">
                <option value="">未選択</option>
                <option value="ホームページ">ホームページ</option>
                <option value="Googleマップ">Googleマップ</option>
                <option value="YouTube">YouTube</option>
                <option value="Instagram">Instagram</option>
                <option value="TikTok">TikTok</option>
                <option value="X">X</option>
                <option value="看板を見て">看板を見て</option>
                <option value="口コミ">口コミ</option>
              </select>
            </label>

            <section class="form-section" id="certificateFields">
              <h3>施工証明書に記載する情報</h3>
              <p>施工証明書作成に使用します。</p>
              <label>
                郵便番号
                <input id="postalCode" name="postalCode" autocomplete="postal-code" placeholder="238-0000" />
              </label>
              <label>
                ご住所
                <input id="address" name="address" autocomplete="street-address" placeholder="神奈川県横浜市..." />
              </label>
              <label>
                ボディカラー
                <input id="coatingBodyColor" name="coatingBodyColor" placeholder="例：ブラック" />
              </label>
            </section>

            <section class="form-section optional-fields">
              <h3>任意入力</h3>
              <label id="washOptionalFields">
                ボディカラー
                <input id="washBodyColor" name="washBodyColor" placeholder="例：ブラック" />
              </label>
              <label>
                気になる汚れ
                <select id="dirtConcern" name="dirtConcern">
                  <option value="">未選択</option>
                  <option value="水シミ">水シミ</option>
                  <option value="鉄粉">鉄粉</option>
                  <option value="洗車機キズ">洗車機キズ</option>
                  <option value="泥汚れ">泥汚れ</option>
                  <option value="細部の汚れ">細部の汚れ</option>
                </select>
              </label>
              <label>
                ご要望
                <textarea id="request" name="request" rows="4" placeholder="お車の状態、気になる汚れ、水シミ、傷、以前の施工内容などがあればご記入ください。どのメニューを選べばよいかわからない場合も、こちらにご記入いただければ内容を確認してご案内いたします。"></textarea>
              </label>
            </section>
            <button class="primary-button" id="submitButton" type="submit" disabled>この内容で予約する</button>
          </form>
          <div id="reservationList" hidden></div>
        </aside>
      </section>
    </main>

    <div class="floating-total" id="floatingTotal" aria-live="polite"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="store-config.js?v=20260620-simple-white"></script>
    <script src="runtime-config.js?v=20260620-simple-white"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="shared-api.js?v=20260620-simple-white"></script>
    <script src="vehicle-size-data.js?v=20260620-simple-white"></script>
    <script src="app.js?v=20260620-simple-white"></script>
  </body>
</html>
